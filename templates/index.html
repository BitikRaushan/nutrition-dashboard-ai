<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack AI | Premium Nutrition Intelligence</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts: Inter & Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Variables */
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.15);
            --secondary: #0ea5e9;
            --bg-body: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --glass-border: rgba(255, 255, 255, 0.4);
            --sidebar-width: 260px;
            --header-height: 70px;
            --protein: #3b82f6;
            --carbs: #f59e0b;
            --fat: #8b5cf6;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode {
            --bg-body: #020617;
            --sidebar-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
            --glass-border: rgba(255, 255, 255, 0.05);
            --primary-glow: rgba(16, 185, 129, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: var(--transition);
            overflow-x: hidden;
            display: flex;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 1000;
            transition: var(--transition);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .logo-box {
            background: linear-gradient(135deg, var(--primary), #059669);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .logo-text {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            /* -webkit-background-clip: text; */
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: var(--transition);
        }

        .nav-link.active {
            background: var(--primary-glow);
            color: var(--primary);
        }

        .nav-link:hover:not(.active) {
            background: var(--bg-body);
            color: var(--text-main);
        }

        /* --- Main Content --- */
        .main-wrapper {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-nav {
            height: var(--header-height);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .header-title h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--sidebar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--primary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 20px;
            border-left: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e2e8f0;
            object-fit: cover;
        }

        /* --- Dashboard Body --- */
        .dashboard-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; translateY(20px); }
            to { opacity: 1; translateY(0); }
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .premium-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            transition: var(--transition);
        }

        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .icon-circle {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* --- Custom Progress Bars --- */
        .progress-wrapper {
            margin-top: 1rem;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .progress-rail {
            height: 8px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* --- Content Grid --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 1.5rem;
        }

        @media (max-width: 1200px) {
            .content-grid { grid-template-columns: 1fr; }
        }

        /* --- Form Styling --- */
        .food-entry-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            padding-right: 5px;
        }

        .food-row {
            display: grid;
            grid-template-columns: 2fr 1fr 48px;
            gap: 12px;
            background: var(--bg-body);
            padding: 1rem;
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .food-row:hover {
            border-color: var(--primary);
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--sidebar-bg);
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: var(--bg-body);
            border: 2px dashed var(--border-color);
            color: var(--text-muted);
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 1rem;
        }

        .btn-add:hover {
            background: var(--primary-glow);
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-calculate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #059669);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px var(--primary-glow);
            transition: var(--transition);
        }

        .btn-calculate:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn-remove {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-remove:hover { background: #fecaca; }

        /* --- Loading Spinner --- */
        #loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Toast Notification --- */
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            transition: bottom 0.5s ease;
            z-index: 1001;
        }

        .toast.show { bottom: 30px; }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>

            </a>

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Settings
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
        <header class="top-nav">
            <div class="header-title">
                <h2>Overview</h2>
            </div>
            <div class="nav-actions">
                <div class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
                    <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </div>
                <div class="user-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=John" class="user-avatar" alt="User">
                    <div style="text-align: left;">
                        <p style="font-size: 0.85rem; font-weight: 700;">John Doe</p>
                        <p style="font-size: 0.7rem; color: var(--text-muted);">Pro Member</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-container">
            <!-- Stats Cards -->
            <div class="stats-overview">
                <!-- Protein Card -->
                <div class="premium-card">
                    <div class="card-header">
                        <div class="stat-label">Protein Intake</div>
                        <div class="icon-circle" style="background: rgba(59, 130, 246, 0.1); color: var(--protein);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                        </div>

                        <div class="progress-meta">

                        <div class="progress-rail">
                            <div id="bar-protein" class="progress-fill" style="background: var(--protein);"></div>

                <!-- Fat Card -->

                    <div class="card-header">

                        </div>

                            <span id="perc-fat">0%</span>
                        </div>

                        </div>

            </div>

            <!-- Content Area -->

                <!-- Log Entry -->
                <div class="premium-card">
                    <div class="card-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                        <h3 style="font-size: 1rem;">Daily Nutrition Log</h3>

                        </div>

    <!-- Toast -->

    <script>
        

        let macroChart, barChart;

        function initCharts() {
            const mCtx = document.getElementById('macroChart').getContext('2d');
            const bCtx = document.getElementById('barChart').getContext('2d');

            const gradientP = mCtx.createLinearGradient(0, 0, 0, 400);
            gradientP.addColorStop(0, '#3b82f6');
            gradientP.addColorStop(1, '#60a5fa');

            macroChart = new Chart(mCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Protein', 'Carbs', 'Fat'],
                    datasets: [{
                        data: [1, 1, 1],
                        backgroundColor: ['#3b82f6', '#f59e0b', '#8b5cf6'],
                        hoverOffset: 20,
                        borderWidth: 0,
                        borderRadius: 5
                    }]
                },
                options: {
                    cutout: '80%',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20, color: '#94a3b8' } } }
                }
            });

            barChart = new Chart(bCtx, {
                type: 'bar',
                data: {
                    labels: ['Protein', 'Carbs', 'Fat'],
                    datasets: [
                        { label: 'Actual', data: [0, 0, 0], backgroundColor: '#10b981', borderRadius: 8 },
                        { label: 'Target', data: [0, 0, 0], backgroundColor: '#e2e8f0', borderRadius: 8 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function addRow() {
            const container = document.getElementById('food-container');
            const row = document.createElement('div');
            row.className = 'food-row';
            row.innerHTML = `
                <div>
                    <select class="f-item">
                        <option value="chicken">Chicken Breast</option>
                        <option value="rice">White Rice</option>
                        <option value="egg">Whole Egg</option>
                        <option value="oats">Rolled Oats</option>
                        <option value="banana">Banana</option>
                        <option value="salmon">Salmon</option>
                        <option value="avocado">Avocado</option>
                        <option value="almonds">Almonds</option>
                        <option value="broccoli">Broccoli</option>
                        <option value="salmon">moong Daal</option>
                        <option value="avocado">Graphes</option>
                        <option value="almonds">Wheat Roti</option>
                        <option value="broccoli">soyachunks</option>
                    </select>
                </div>
                <div>
                    <input type="number" class="f-qty" value="100" placeholder="Qty (g)">
                </div>
                <button class="btn-remove" onclick="this.parentElement.remove()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            `;
            container.appendChild(row);
        }

        
        async function calculate() {

            const weight = parseFloat(document.getElementById('user-weight').value);

             let foods = [];


            document.querySelectorAll('.food-row').forEach(row => {

                const name = row.querySelector('.f-item').value;
                const qty = parseFloat(row.querySelector('.f-qty').value);

                foods.push({ name, qty });
            });

    // 🔥 CALL BACKEND
            const res = await fetch('/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ weight, foods })
            });

        const data = await res.json();
        // 🔥 UPDATE CHARTS
        macroChart.data.datasets[0].data = [
        data.totals.protein || 1,
        data.totals.carbs || 1,
        data.totals.fat || 1
        ];
        macroChart.update();

        barChart.data.datasets[0].data = [
    data.totals.protein,
    data.totals.carbs,
    data.totals.fat
];

        barChart.data.datasets[1].data = [
    data.required.protein,
    data.required.carbs,
    data.required.fat
];

        barChart.update();

    // 🔥 UPDATE UI
        updateUI('protein', data.totals.protein, data.required.protein);
        updateUI('carbs', data.totals.carbs, data.required.carbs);
        updateUI('fat', data.totals.fat, data.required.fat);

        console.log("Suggestions:", data.suggestions);
   }

        function updateUI(id, val, target) {
            const perc = Math.min(Math.round((val / target) * 100), 100);
            document.getElementById(`val-${id}`).innerText = Math.round(val) + 'g';
            document.getElementById(`perc-${id}`).innerText = perc + '%';
            document.getElementById(`bar-${id}`).style.width = perc + '%';
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            const isDark = document.body.classList.contains('dark-mode');
            
            icon.innerHTML = isDark 
                ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
                : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }

        window.onload = () => {
            document.getElementById('date-label').innerText = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            addRow();
            initCharts();
        };
    </script>
